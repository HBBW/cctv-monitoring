version: "3.8"

services:
  mysql:
    image: mysql:8.4
    container_name: cctv-monitoring-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-cctv_exception_monitoring}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-cctv}
      MYSQL_PASSWORD: ${DB_PASSWORD:-cctv}
    ports:
      - "${MYSQL_PORT:-3310}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cctv-monitoring-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8010}:8000"
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY:-}
      APP_URL: ${APP_URL:-https://api-cctv.bmc.co.id}
      FRONTEND_URL: ${FRONTEND_URL:-https://lab.bmc.co.id}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-cctv_exception_monitoring}
      DB_USERNAME: ${DB_USERNAME:-cctv}
      DB_PASSWORD: ${DB_PASSWORD:-cctv}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: public
    volumes:
      - backend_public_storage:/var/www/html/storage/app/public

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cctv-monitoring-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3010}:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-}

  phpmyadmin:
    image: phpmyadmin:5
    container_name: cctv-monitoring-phpmyadmin
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${PHPMYADMIN_PORT:-8586}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-root}

volumes:
  mysql_data:
  backend_public_storage:
