version: "3.8"

services:
  mysql:
    image: mysql:8.4
    container_name: cctv-monitoring-mysql
    restart: always
    environment:
      MYSQL_DATABASE: cctv_exception_monitoring
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: cctv
      MYSQL_PASSWORD: cctv
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cctv-monitoring-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: cctv_exception_monitoring
      DB_USERNAME: cctv
      DB_PASSWORD: cctv
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: public

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cctv-monitoring-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api

  phpmyadmin:
    image: phpmyadmin:5
    container_name: cctv-monitoring-phpmyadmin
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root

volumes:
  mysql_data:
