version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cctv-monitoring-backend
    restart: always
    ports:
      - "8000:8000"
    networks:
      - network_mysql
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: mysql_native_server
      DB_PORT: 3306
      DB_DATABASE: BMC
      DB_USERNAME: root
      DB_PASSWORD: Ptbmc123
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: public

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cctv-monitoring-frontend
    restart: always
    ports:
      - "80:5173"
    networks:
      - network_mysql
    depends_on:
      - backend

networks:
  network_mysql:
    external: true
    name: mysql-server_default
